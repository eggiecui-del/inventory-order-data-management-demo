<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Inventory Demo{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="{{ url_for('product_list') }}">Inventory Demo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav">
                    <a class="nav-link" href="{{ url_for('product_list') }}">Products</a>
                    <a class="nav-link" href="{{ url_for('product_new') }}">Add Product</a>
                    <a class="nav-link" href="{{ url_for('inventory_update') }}">Update Stock</a>
                    <a class="nav-link" href="{{ url_for('inventory_logs') }}">Stock Logs</a>
                    <a class="nav-link" href="{{ url_for('customers') }}">Customers</a>
                    <a class="nav-link" href="{{ url_for('orders') }}">Orders</a>
                    <a class="nav-link" href="{{ url_for('export_inventory') }}">Export CSV</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container-fluid py-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-wrap">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
